<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LibreTranslate Demo</title>

<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 700px;
        margin: 40px auto;
        padding: 20px;
    }

    textarea {
        width: 100%;
        height: 120px;
        margin-top: 10px;
        padding: 10px;
    }

    .controls {
        display: flex;
        gap: 10px;
        align-items: center;
        margin: 15px 0;
    }

    select, button {
        padding: 8px 12px;
    }

    #result {
        margin-top: 15px;
        padding: 12px;
        border: 1px solid #ccc;
        min-height: 60px;
        background: #f9f9f9;
    }
</style>
</head>
<body>

<h2>LibreTranslate Language Translator</h2>

<textarea id="sourceText" placeholder="Enter text..."></textarea>

<div class="controls">
    <select id="sourceLang">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="hi">Hindi</option>
        <option value="te">Telugu</option>
    </select>

    <button onclick="swapLanguages()">⇄ Swap</button>

    <select id="targetLang">
        <option value="hi">Hindi</option>
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="te">Telugu</option>
    </select>

    <button onclick="translateText()">Translate</button>
</div>

<div id="result">Translation will appear here...</div>

<script>
function swapLanguages() {
    const source = document.getElementById("sourceLang");
    const target = document.getElementById("targetLang");

    const temp = source.value;
    source.value = target.value;
    target.value = temp;
}

async function translateText() {
    const text = document.getElementById("sourceText").value;
    const source = document.getElementById("sourceLang").value;
    const target = document.getElementById("targetLang").value;

    try {
        const response = await fetch("https://libretranslate.com/translate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                q: text,
                source: source,
                target: target,
                format: "text"
            })
        });

        const data = await response.json();

        document.getElementById("result").innerText =
            data.translatedText || "No translation received.";
    } catch (error) {
        document.getElementById("result").innerText =
            "Error: " + error.message;
    }
}
</script>

</body>
</html>
